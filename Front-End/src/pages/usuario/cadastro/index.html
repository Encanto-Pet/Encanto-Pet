<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encanto Pet - Cadastro</title>

  <!-- Fonte Baloo -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <section class="left">

      <h1>
        Seu pet autorizou<br>
        esse cadastro
      </h1>

      <p class="subtitle">
        Mas caso já tenha cadastro,<br> 
        <a href="../login/index.html">Acesse sua conta!</a>
      </p>
      <div class="wrapper">
      <form class="form">

      <div class="input-group">
        <label for="nome">Nome</label>
        <input type="text" id="nome" required>
      </div>

      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" required>
      </div>

      <div class="input-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" required>
      </div>

      <div class="input-group">
        <label for="confirmar">Confirmação de senha</label>
        <input type="password" id="confirmar" required>
      </div>

      <button type="submit" class="btn">Finalizar!</button>

      <div class="extras">
        <label class="check">
          <input type="checkbox">
          Lembrar a senha
        </label>

        <label class="check">
          <input type="checkbox" required>
          Aceito com os <a href="#">Termos de Uso</a> e <a href="#">Política</a>
        </label>
      </div>

    </form>
    </div>
    </section>

    <section class="right">
      <img src="../../../assets/img/cachorro login.svg" alt="">
       <img src="../../../assets/img/logo.svg" alt="Logo Encanto Pet" class="logo">
    </section>

  </main>

</body>
</html>
