<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encanto Pet - Login</title>

  <!-- Fonte Baloo -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <section class="left">

     

      <h1>
        Pronto para encher<br>
        o carrinho?
      </h1>

      <p class="subtitle">
        Se você não tem uma <br>conta, 
        <a href="../cadastro/index.html">crie uma aqui!</a>
      </p>

      <form class="form-container">

  <div class="input-group">
    <label for="nova-senha">Nova senha</label>

    <div class="password-wrapper">
      <input type="password" id="nova-senha" placeholder="********" required>

      <button type="button">
        <img src="../../../assets/icon/cachorro-olho-fechado.svg">
      </button>
    </div>
  </div>


  <div class="input-group">
    <label for="confirma-senha">Confirmação da senha</label>

    <div class="password-wrapper">
      <input type="password" id="confirma-senha" placeholder="********" required>

      <button type="button">
        <img src="../../../assets/icon/cachorro-olho-fechado.svg">
      </button>
    </div>
  </div>


  <button type="submit" class="btn">
    Alterar
  </button>

</form>

    </section>

    <section class="right">
      <img src="../../../assets/img/Marrom.svg" alt="">
       <img src="../../../assets/img/logo.svg" alt="Logo Encanto Pet" class="logo">
    </section>

  </main>

</body>
</html>
