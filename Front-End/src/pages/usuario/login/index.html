<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Encanto Pet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="container">

    <!-- LADO ESQUERDO -->
    <section class="login-section" aria-labelledby="titulo-login">

      <img src="../../../assets/img/logo.svg" alt="Logo Encanto Pet" class="logo">

      <h1 id="titulo-login">
        Pronto para encher <br />
        o carrinho?
      </h1>

      <p class="subtitle">
        Se você não tem uma conta,
        <a href="#" class="link-destaque">crie uma aqui!</a>
      </p>

      <form id="loginForm" novalidate>

        <div class="form-group">
          <label for="email">Email</label>
          <input 
            type="email" 
            id="email" 
            name="email"
            placeholder="Insira o seu email"
            required
            aria-describedby="emailErro"
          />
          <span class="erro" id="emailErro"></span>
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <div class="senha-wrapper">
            <input 
              type="password" 
              id="senha" 
              name="senha"
              placeholder="********"
              required
              minlength="6"
              aria-describedby="senhaErro"
            />
            <button 
              type="button" 
              class="toggle-senha"
              aria-label="Mostrar ou esconder senha"
            >
              <img src="../../../assets/icon/cachorro-olho-aberto.svg" alt="">
            </button>
          </div>
          <span class="erro" id="senhaErro"></span>
        </div>

        <a href="#" class="esqueci">Esqueci a senha</a> <br><br>

        <button type="submit" class="btn-login">
          Entrar
        </button>

      </form>

    </section>

    <!-- LADO DIREITO -->
    <section class="image-section" aria-hidden="true">
      <img src="dog.png" alt="" class="dog-img">
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
